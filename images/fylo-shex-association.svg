<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk', 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="700" height="420" rx="12" fill="#0f172a"/>
  <rect width="700" height="420" rx="12" fill="url(#dots)"/>

  <!-- Title -->
  <text x="350" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#e2e8f0">ShEx Shape: fylo:Association</text>
  <text x="350" y="48" text-anchor="middle" font-size="9" fill="#64748b">from fylo_graph.shex</text>

  <!-- Main shape box -->
  <g transform="translate(120, 64)">
    <!-- Shape container -->
    <rect width="460" height="310" rx="10" fill="rgba(30,41,59,0.85)" stroke="rgba(100,116,139,0.3)" stroke-width="1.2" filter="url(#shadow)"/>

    <!-- Header bar -->
    <rect width="460" height="40" rx="10" fill="rgba(124,58,237,0.15)"/>
    <rect y="30" width="460" height="10" fill="rgba(124,58,237,0.15)"/>
    <line x1="0" y1="40" x2="460" y2="40" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>

    <!-- Shape name -->
    <circle cx="24" cy="20" r="8" fill="rgba(139,92,246,0.2)" stroke="#a78bfa" stroke-width="1.2"/>
    <text x="24" y="23" text-anchor="middle" font-size="8" font-weight="700" fill="#a78bfa">A</text>
    <text x="40" y="24" font-size="12" font-weight="700" fill="#e2e8f0">fylo:Association</text>
    <text x="370" y="24" font-size="8" fill="#64748b">Shape definition</text>

    <!-- REQUIRED section -->
    <g transform="translate(20, 52)">
      <rect x="0" y="0" width="420" height="18" rx="4" fill="rgba(59,130,246,0.08)"/>
      <text x="6" y="12" font-size="8" font-weight="700" fill="#60a5fa" letter-spacing="0.5">REQUIRED</text>
      <line x1="72" y1="6" x2="72" y2="12" stroke="#3b82f6" stroke-width="1.5"/>
    </g>

    <!-- Required fields -->
    <g transform="translate(20, 76)">
      <!-- text_span -->
      <rect x="0" y="0" width="420" height="28" rx="4" fill="rgba(30,41,59,0.6)" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>
      <rect x="0" y="0" width="4" height="28" rx="2" fill="#3b82f6"/>
      <text x="14" y="12" font-size="10" font-weight="600" fill="#e2e8f0">fylo:text_span</text>
      <text x="14" y="24" font-size="8" fill="#94a3b8">xsd:string</text>
      <rect x="340" y="6" width="60" height="16" rx="3" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.25)" stroke-width="0.8"/>
      <text x="370" y="17" text-anchor="middle" font-size="8" font-weight="600" fill="#60a5fa">required</text>

      <!-- arg0 -->
      <rect x="0" y="34" width="420" height="28" rx="4" fill="rgba(30,41,59,0.6)" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>
      <rect x="0" y="34" width="4" height="28" rx="2" fill="#3b82f6"/>
      <text x="14" y="46" font-size="10" font-weight="600" fill="#e2e8f0">fylo:arg0</text>
      <text x="14" y="58" font-size="8" fill="#94a3b8">IRI+ — first factor in the association</text>
      <rect x="340" y="40" width="60" height="16" rx="3" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.25)" stroke-width="0.8"/>
      <text x="370" y="51" text-anchor="middle" font-size="8" font-weight="600" fill="#60a5fa">1 or more</text>

      <!-- arg1 -->
      <rect x="0" y="68" width="420" height="28" rx="4" fill="rgba(30,41,59,0.6)" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>
      <rect x="0" y="68" width="4" height="28" rx="2" fill="#3b82f6"/>
      <text x="14" y="80" font-size="10" font-weight="600" fill="#e2e8f0">fylo:arg1</text>
      <text x="14" y="92" font-size="8" fill="#94a3b8">IRI+ — second factor in the association</text>
      <rect x="340" y="74" width="60" height="16" rx="3" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.25)" stroke-width="0.8"/>
      <text x="370" y="85" text-anchor="middle" font-size="8" font-weight="600" fill="#60a5fa">1 or more</text>
    </g>

    <!-- OPTIONAL section -->
    <g transform="translate(20, 182)">
      <rect x="0" y="0" width="420" height="18" rx="4" fill="rgba(139,92,246,0.06)"/>
      <text x="6" y="12" font-size="8" font-weight="700" fill="#a78bfa" letter-spacing="0.5">OPTIONAL</text>
      <line x1="68" y1="6" x2="68" y2="12" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="2,1"/>
    </g>

    <!-- Optional fields -->
    <g transform="translate(20, 206)">
      <!-- logic_repr -->
      <rect x="0" y="0" width="420" height="22" rx="4" fill="none" stroke="rgba(139,92,246,0.2)" stroke-width="1" stroke-dasharray="4,2"/>
      <text x="14" y="15" font-size="9.5" fill="#c4b5fd">fylo:logic_repr</text>
      <text x="160" y="15" font-size="8" fill="#94a3b8">xsd:string</text>
      <rect x="340" y="4" width="60" height="14" rx="3" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.15)" stroke-width="0.8"/>
      <text x="370" y="14" text-anchor="middle" font-size="7.5" font-weight="500" fill="#a78bfa">optional</text>

      <!-- comp_to -->
      <rect x="0" y="26" width="420" height="22" rx="4" fill="none" stroke="rgba(139,92,246,0.2)" stroke-width="1" stroke-dasharray="4,2"/>
      <text x="14" y="41" font-size="9.5" fill="#c4b5fd">fylo:comp_to</text>
      <text x="160" y="41" font-size="8" fill="#94a3b8">IRI*</text>
      <rect x="340" y="30" width="60" height="14" rx="3" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.15)" stroke-width="0.8"/>
      <text x="370" y="40" text-anchor="middle" font-size="7.5" font-weight="500" fill="#a78bfa">0 or more</text>

      <!-- modifier -->
      <rect x="0" y="52" width="420" height="22" rx="4" fill="none" stroke="rgba(139,92,246,0.2)" stroke-width="1" stroke-dasharray="4,2"/>
      <text x="14" y="67" font-size="9.5" fill="#c4b5fd">fylo:modifier</text>
      <text x="160" y="67" font-size="8" fill="#94a3b8">IRI*</text>
      <rect x="340" y="56" width="60" height="14" rx="3" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.15)" stroke-width="0.8"/>
      <text x="370" y="66" text-anchor="middle" font-size="7.5" font-weight="500" fill="#a78bfa">0 or more</text>

      <!-- q_plus, q_minus row -->
      <rect x="0" y="78" width="202" height="22" rx="4" fill="none" stroke="rgba(139,92,246,0.2)" stroke-width="1" stroke-dasharray="4,2"/>
      <text x="14" y="93" font-size="9.5" fill="#c4b5fd">fylo:q_plus</text>
      <text x="100" y="93" font-size="8" fill="#94a3b8">IRI*</text>

      <rect x="218" y="78" width="202" height="22" rx="4" fill="none" stroke="rgba(139,92,246,0.2)" stroke-width="1" stroke-dasharray="4,2"/>
      <text x="232" y="93" font-size="9.5" fill="#c4b5fd">fylo:q_minus</text>
      <text x="330" y="93" font-size="8" fill="#94a3b8">IRI*</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(20, 396)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="1"/>
    <text x="18" y="10" font-size="8" fill="#94a3b8">Required field (solid border)</text>

    <rect x="170" y="0" width="12" height="12" rx="2" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="188" y="10" font-size="8" fill="#94a3b8">Optional field (dashed border)</text>

    <text x="380" y="10" font-size="8" fill="#64748b">+ = one or more, * = zero or more</text>
  </g>

  <rect width="700" height="420" rx="12" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
</svg>