<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 740" font-family="'JetBrains Mono', monospace">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="740" fill="#020617"/>

  <!-- Title -->
  <text x="410" y="40" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="600">Degradation Tier Flowchart</text>

  <!-- Start node -->
  <ellipse cx="410" cy="90" rx="100" ry="28" fill="rgba(251, 191, 36, 0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="410" y="94" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Review Request</text>

  <!-- Arrow to first decision -->
  <line x1="410" y1="120" x2="410" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision 1: Parse + Score OK? -->
  <g transform="translate(410, 190)">
    <polygon points="0,-35 60,0 0,35 -60,0" fill="rgba(251, 191, 36, 0.1)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="0" y="-5" text-anchor="middle" fill="#fbbf24" font-size="9">Parse OK +</text>
    <text x="0" y="8" text-anchor="middle" fill="#fbbf24" font-size="9">Score OK?</text>
  </g>

  <!-- YES path to Full Pipeline (left) -->
  <line x1="348" y1="190" x2="160" y2="190" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="254" y="182" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">yes</text>

  <!-- Full Pipeline tier -->
  <g transform="translate(60, 160)">
    <rect width="100" height="60" rx="8" fill="#0f172a"/>
    <rect width="100" height="60" rx="8" fill="rgba(34, 197, 94, 0.2)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="50" y="25" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Full Pipeline</text>
    <text x="50" y="40" text-anchor="middle" fill="#94a3b8" font-size="8">parse + GNN +</text>
    <text x="50" y="52" text-anchor="middle" fill="#94a3b8" font-size="8">LLM analysis</text>
  </g>

  <!-- NO path down to second decision -->
  <line x1="410" y1="227" x2="410" y2="275" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="422" y="255" fill="#ef4444" font-size="10" font-weight="600">no</text>

  <!-- Decision 2: Live parse available? -->
  <g transform="translate(410, 310)">
    <polygon points="0,-35 65,0 0,35 -65,0" fill="rgba(251, 191, 36, 0.1)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="0" y="-5" text-anchor="middle" fill="#fbbf24" font-size="9">Live parse</text>
    <text x="0" y="8" text-anchor="middle" fill="#fbbf24" font-size="9">available?</text>
  </g>

  <!-- YES path to Symbolic-only (left) -->
  <line x1="343" y1="310" x2="166" y2="310" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="254" y="302" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">yes</text>

  <!-- Symbolic-only tier -->
  <g transform="translate(60, 280)">
    <rect width="100" height="60" rx="8" fill="#0f172a"/>
    <rect width="100" height="60" rx="8" fill="rgba(251, 191, 36, 0.2)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="50" y="25" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">Symbolic-Only</text>
    <text x="50" y="40" text-anchor="middle" fill="#94a3b8" font-size="8">Kosaraju SCC</text>
    <text x="50" y="52" text-anchor="middle" fill="#94a3b8" font-size="8">no anomaly scores</text>
  </g>

  <!-- NO path to Retroactive (right) -->
  <line x1="477" y1="310" x2="644" y2="310" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="560" y="302" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">no</text>

  <!-- Retroactive tier -->
  <g transform="translate(660, 280)">
    <rect width="120" height="60" rx="8" fill="#0f172a"/>
    <rect width="120" height="60" rx="8" fill="rgba(139, 92, 246, 0.2)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="60" y="25" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Retroactive</text>
    <text x="60" y="40" text-anchor="middle" fill="#94a3b8" font-size="8">MongoDB reload</text>
    <text x="60" y="52" text-anchor="middle" fill="#94a3b8" font-size="8">historical artifacts</text>
  </g>

  <!-- Convergence paths to Quality Gate -->
  <!-- From Full Pipeline -->
  <path d="M110 222 L110 460 L398 460" stroke="#22c55e" stroke-width="1.2" fill="none" marker-end="url(#arrow-green)"/>

  <!-- From Symbolic-only -->
  <path d="M110 342 L110 480 L398 480" stroke="#fbbf24" stroke-width="1.2" fill="none" marker-end="url(#arrow-amber)"/>

  <!-- From Retroactive -->
  <path d="M720 342 L720 500 L422 500" stroke="#a78bfa" stroke-width="1.2" fill="none" marker-end="url(#arrow-purple)"/>

  <!-- Quality Gate decision -->
  <g transform="translate(410, 480)">
    <polygon points="0,-35 65,0 0,35 -65,0" fill="rgba(251, 191, 36, 0.1)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="0" y="-5" text-anchor="middle" fill="#fbbf24" font-size="9">SVG visibly</text>
    <text x="0" y="8" text-anchor="middle" fill="#fbbf24" font-size="9">changed?</text>
  </g>

  <!-- YES path to Complete -->
  <line x1="410" y1="517" x2="410" y2="570" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="425" y="548" fill="#22c55e" font-size="10" font-weight="600">yes</text>

  <!-- Complete node -->
  <ellipse cx="410" cy="600" rx="90" ry="26" fill="rgba(34, 197, 94, 0.15)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="410" y="604" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">Persist &amp; Complete</text>

  <!-- NO path to Failed -->
  <line x1="477" y1="480" x2="600" y2="480" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="538" y="472" fill="#ef4444" font-size="10" font-weight="600">no</text>

  <!-- Failed node -->
  <ellipse cx="670" cy="480" rx="65" ry="24" fill="rgba(239, 68, 68, 0.15)" stroke="#ef4444" stroke-width="1.5"/>
  <text x="670" y="484" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Mark Failed</text>

  <!-- Quality tiers legend -->
  <g transform="translate(60, 650)">
    <rect width="700" height="70" rx="8" fill="rgba(30, 41, 59, 0.5)"/>
    <text x="350" y="20" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">QUALITY TIERS</text>

    <g transform="translate(20, 35)">
      <circle cx="8" cy="8" r="8" fill="rgba(34, 197, 94, 0.3)" stroke="#22c55e" stroke-width="1"/>
      <text x="22" y="11" fill="#94a3b8" font-size="9">Full (parse + GNN + LLM)</text>
    </g>

    <g transform="translate(220, 35)">
      <circle cx="8" cy="8" r="8" fill="rgba(251, 191, 36, 0.3)" stroke="#fbbf24" stroke-width="1"/>
      <text x="22" y="11" fill="#94a3b8" font-size="9">Symbolic (structural facts only)</text>
    </g>

    <g transform="translate(470, 35)">
      <circle cx="8" cy="8" r="8" fill="rgba(139, 92, 246, 0.3)" stroke="#a78bfa" stroke-width="1"/>
      <text x="22" y="11" fill="#94a3b8" font-size="9">Retroactive (reloaded artifacts)</text>
    </g>
  </g>
</svg>
