<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="'Inter',system-ui,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#94a3b8"/></marker>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="720" height="520" fill="#0f172a" rx="12"/>
  <text x="360" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Kafka Topic Topology</text>

  <!-- GitHub Webhook -->
  <ellipse cx="90" cy="110" rx="70" ry="28" fill="#fbbf24" fill-opacity=".15" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="90" y="114" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">GitHub Webhook</text>

  <!-- Arrow 1 -->
  <line x1="162" y1="110" x2="220" y2="110" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- review.requested -->
  <rect x="222" y="86" width="160" height="48" rx="8" fill="#3b82f6" fill-opacity=".15" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="302" y="106" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">review.requested</text>
  <text x="302" y="122" text-anchor="middle" fill="#94a3b8" font-size="10">partitions: 6</text>

  <!-- Arrow 2 -->
  <line x1="384" y1="110" x2="442" y2="110" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Graph Workers -->
  <rect x="444" y="78" width="190" height="64" rx="8" fill="#8b5cf6" fill-opacity=".15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="539" y="100" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">Graph Workers</text>
  <text x="539" y="116" text-anchor="middle" fill="#94a3b8" font-size="10">consumer: graph-consumer</text>
  <text x="539" y="132" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">replicas: 3</text>

  <!-- Arrow down -->
  <line x1="539" y1="144" x2="539" y2="180" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- graph.ready -->
  <rect x="444" y="182" width="190" height="48" rx="8" fill="#3b82f6" fill-opacity=".15" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="539" y="202" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">graph.ready</text>
  <text x="539" y="218" text-anchor="middle" fill="#94a3b8" font-size="10">partitions: 6</text>

  <!-- Arrow down -->
  <line x1="539" y1="232" x2="539" y2="268" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GNN Workers -->
  <rect x="444" y="270" width="190" height="64" rx="8" fill="#8b5cf6" fill-opacity=".15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="539" y="292" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">GNN Workers</text>
  <text x="539" y="308" text-anchor="middle" fill="#94a3b8" font-size="10">consumer: gnn-consumer</text>
  <text x="539" y="324" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">replicas: 2</text>
  <!-- Triton annotation -->
  <text x="650" y="306" text-anchor="start" fill="#64748b" font-size="10">→ Triton (GPU)</text>

  <!-- Arrow down -->
  <line x1="539" y1="336" x2="539" y2="372" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- scores.ready -->
  <rect x="444" y="374" width="190" height="48" rx="8" fill="#3b82f6" fill-opacity=".15" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="539" y="394" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">scores.ready</text>
  <text x="539" y="410" text-anchor="middle" fill="#94a3b8" font-size="10">partitions: 6</text>

  <!-- Backpressure annotation -->
  <text x="302" y="265" text-anchor="middle" fill="#475569" font-size="9" font-style="italic">if LLM slow →</text>
  <text x="302" y="278" text-anchor="middle" fill="#475569" font-size="9" font-style="italic">topic grows, no upstream impact</text>
  <line x1="220" y1="285" x2="430" y2="285" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- Arrow across to LLM -->
  <path d="M 442 398 L 360 420 L 360 430" stroke="#94a3b8" stroke-width="1.2" fill="none" marker-end="url(#arr)" stroke-dasharray="4 3"/>

  <!-- LLM Workers (left side) -->
  <rect x="90" y="432" width="190" height="64" rx="8" fill="#8b5cf6" fill-opacity=".15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="185" y="454" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">LLM Workers</text>
  <text x="185" y="470" text-anchor="middle" fill="#94a3b8" font-size="10">consumer: llm-consumer</text>
  <text x="185" y="486" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">replicas: 5</text>

  <!-- Arrow down to review.complete -->
  <line x1="185" y1="496" x2="185" y2="510" stroke="#8b5cf6" stroke-width="1.5"/>

  <!-- Legend -->
  <rect x="20" y="475" width="10" height="10" rx="2" fill="#3b82f6" fill-opacity=".3" stroke="#3b82f6" stroke-width="1"/>
  <text x="36" y="484" fill="#94a3b8" font-size="9">Topic</text>
  <rect x="80" y="475" width="10" height="10" rx="2" fill="#8b5cf6" fill-opacity=".3" stroke="#8b5cf6" stroke-width="1"/>
  <text x="96" y="484" fill="#94a3b8" font-size="9">Worker</text>
  <ellipse cx="155" cy="480" rx="6" ry="6" fill="#fbbf24" fill-opacity=".3" stroke="#fbbf24" stroke-width="1"/>
  <text x="166" y="484" fill="#94a3b8" font-size="9">I/O</text>
</svg>
