<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 620" font-family="'JetBrains Mono', monospace">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#64748b"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#60a5fa"/>
    </marker>
    <!-- Background grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="840" height="620" fill="#020617"/>
  <rect width="840" height="620" fill="url(#grid)"/>

  <!-- Title -->
  <text x="420" y="40" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="600">Kafka Topic Topology</text>

  <!-- Arrows layer (drawn first to appear behind boxes) -->
  <!-- GitHub to review.requested -->
  <line x1="160" y1="120" x2="240" y2="120" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- review.requested to Graph Workers -->
  <line x1="400" y1="120" x2="480" y2="120" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Graph Workers to graph.ready -->
  <line x1="570" y1="150" x2="570" y2="200" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- graph.ready to GNN Workers -->
  <line x1="570" y1="260" x2="570" y2="310" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- GNN Workers to scores.ready -->
  <line x1="570" y1="370" x2="570" y2="420" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- scores.ready to LLM Workers (dashed, across) -->
  <path d="M 480 444 L 180 444 L 180 480" stroke="#64748b" stroke-width="1.2" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- GitHub Webhook -->
  <ellipse cx="100" cy="120" rx="60" ry="28" fill="rgba(251, 191, 36, 0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="100" y="124" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">GitHub</text>
  <text x="100" y="138" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Webhook</text>

  <!-- review.requested topic -->
  <rect x="240" y="96" width="160" height="48" rx="6" fill="#0f172a"/>
  <rect x="240" y="96" width="160" height="48" rx="6" fill="rgba(59, 130, 246, 0.2)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="320" y="116" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">review.requested</text>
  <text x="320" y="132" text-anchor="middle" fill="#94a3b8" font-size="9">partitions: 6</text>

  <!-- Graph Workers -->
  <rect x="480" y="90" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="480" y="90" width="180" height="60" rx="6" fill="rgba(139, 92, 246, 0.2)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="570" y="112" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600">Graph Workers</text>
  <text x="570" y="128" text-anchor="middle" fill="#94a3b8" font-size="9">consumer: graph-consumer</text>
  <text x="570" y="142" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">replicas: 3</text>

  <!-- graph.ready topic -->
  <rect x="480" y="200" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="480" y="200" width="180" height="60" rx="6" fill="rgba(59, 130, 246, 0.2)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="570" y="222" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">graph.ready</text>
  <text x="570" y="238" text-anchor="middle" fill="#94a3b8" font-size="9">partitions: 6</text>
  <text x="570" y="252" text-anchor="middle" fill="#94a3b8" font-size="9">retention: 1hr</text>

  <!-- GNN Workers -->
  <rect x="480" y="310" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="480" y="310" width="180" height="60" rx="6" fill="rgba(139, 92, 246, 0.2)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="570" y="332" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600">GNN Workers</text>
  <text x="570" y="348" text-anchor="middle" fill="#94a3b8" font-size="9">consumer: gnn-consumer</text>
  <text x="570" y="362" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">replicas: 2</text>

  <!-- Triton annotation -->
  <text x="670" y="345" text-anchor="start" fill="#64748b" font-size="9">→ Triton (GPU)</text>

  <!-- scores.ready topic -->
  <rect x="480" y="420" width="180" height="48" rx="6" fill="#0f172a"/>
  <rect x="480" y="420" width="180" height="48" rx="6" fill="rgba(59, 130, 246, 0.2)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="570" y="440" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">scores.ready</text>
  <text x="570" y="456" text-anchor="middle" fill="#94a3b8" font-size="9">partitions: 6</text>

  <!-- LLM Workers -->
  <rect x="90" y="480" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="90" y="480" width="180" height="60" rx="6" fill="rgba(139, 92, 246, 0.2)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="180" y="502" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600">LLM Workers</text>
  <text x="180" y="518" text-anchor="middle" fill="#94a3b8" font-size="9">consumer: llm-consumer</text>
  <text x="180" y="532" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">replicas: 5</text>

  <!-- Backpressure annotation -->
  <text x="320" y="340" text-anchor="middle" fill="#475569" font-size="9" font-style="italic">if LLM slow →</text>
  <text x="320" y="353" text-anchor="middle" fill="#475569" font-size="9" font-style="italic">topic grows, no upstream impact</text>
  <line x1="240" y1="360" x2="470" y2="360" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- Legend -->
  <g transform="translate(90, 570)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="rgba(59, 130, 246, 0.3)" stroke="#3b82f6" stroke-width="1"/>
    <text x="20" y="11" fill="#94a3b8" font-size="9">Kafka Topic</text>

    <rect x="110" y="0" width="14" height="14" rx="3" fill="rgba(139, 92, 246, 0.3)" stroke="#8b5cf6" stroke-width="1"/>
    <text x="130" y="11" fill="#94a3b8" font-size="9">Worker Group</text>

    <ellipse cx="237" cy="7" rx="10" ry="7" fill="rgba(251, 191, 36, 0.2)" stroke="#fbbf24" stroke-width="1"/>
    <text x="252" y="11" fill="#94a3b8" font-size="9">External I/O</text>
  </g>

  <!-- Flow annotation -->
  <text x="750" y="580" text-anchor="end" fill="#475569" font-size="8">request → processing → response</text>
</svg>
