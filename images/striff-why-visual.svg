<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2F7"/>
    </linearGradient>
    <linearGradient id="leftPanel" x1="78" y1="122" x2="534" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="rightPanel" x1="662" y1="122" x2="1122" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="shadow" x="40" y="90" width="1120" height="610" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#0F172A" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="36" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="68" y="110" width="1064" height="560" rx="28" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  </g>
  <rect x="96" y="140" width="470" height="500" rx="22" fill="url(#leftPanel)" stroke="#000000" stroke-width="2"/>
  <rect x="634" y="140" width="470" height="500" rx="22" fill="url(#rightPanel)" stroke="#000000" stroke-width="2"/>
  <text x="128" y="190" fill="#9A3412" font-family="IBM Plex Sans, Arial, sans-serif" font-size="24" font-weight="700">Typical PR View</text>
  <text x="666" y="190" fill="#1D4ED8" font-family="IBM Plex Sans, Arial, sans-serif" font-size="24" font-weight="700">Striff View</text>
  <text x="128" y="225" fill="#475569" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">Lots of files. Weak sense of system impact.</text>
  <text x="666" y="225" fill="#475569" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">Structural change, dependencies, and risk in one artifact.</text>

  <g stroke="#CBD5E1" stroke-width="2">
    <line x1="128" y1="276" x2="534" y2="276"/>
    <line x1="128" y1="324" x2="534" y2="324"/>
    <line x1="128" y1="372" x2="534" y2="372"/>
    <line x1="128" y1="420" x2="534" y2="420"/>
    <line x1="128" y1="468" x2="534" y2="468"/>
    <line x1="128" y1="516" x2="452" y2="516"/>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="18" font-weight="600">
    <text x="128" y="266" fill="#0F172A">+ update handler, service, tests, config</text>
    <text x="128" y="314" fill="#0F172A">+ rename gateway methods</text>
    <text x="128" y="362" fill="#0F172A">- old validation path removed</text>
    <text x="128" y="410" fill="#0F172A">+ new dependency injected</text>
    <text x="128" y="458" fill="#0F172A">~ metrics and docs changed</text>
    <text x="128" y="506" fill="#0F172A">?</text>
  </g>
  <rect x="124" y="548" width="264" height="56" rx="14" fill="#FED7AA" stroke="#000000" stroke-width="2"/>
  <text x="146" y="582" fill="#7C2D12" font-family="IBM Plex Sans, Arial, sans-serif" font-size="19" font-weight="700">Hard to see blast radius</text>

  <g>
    <rect x="700" y="280" width="170" height="88" rx="16" fill="#DBEAFE" stroke="#000000" stroke-width="2"/>
    <rect x="920" y="240" width="142" height="76" rx="16" fill="#DCFCE7" stroke="#000000" stroke-width="2"/>
    <rect x="900" y="418" width="152" height="78" rx="16" fill="#FEF3C7" stroke="#000000" stroke-width="2"/>
    <rect x="704" y="458" width="176" height="88" rx="16" fill="#FCE7F3" stroke="#000000" stroke-width="2"/>
    <path d="M870 324H920" stroke="#0F172A" stroke-width="3" stroke-linecap="round"/>
    <path d="M785 368V458" stroke="#0F172A" stroke-width="3" stroke-linecap="round"/>
    <path d="M970 316V418" stroke="#0F172A" stroke-width="3" stroke-linecap="round"/>
    <path d="M880 500H900" stroke="#0F172A" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g font-family="IBM Plex Sans, Arial, sans-serif" fill="#0F172A">
    <text x="728" y="314" font-size="22" font-weight="700">Gateway</text>
    <text x="728" y="344" font-size="17">Changed class, metrics up</text>
    <text x="938" y="272" font-size="21" font-weight="700">Rate Limiter</text>
    <text x="938" y="298" font-size="16">New edge added</text>
    <text x="918" y="450" font-size="21" font-weight="700">AI Review Note</text>
    <text x="918" y="476" font-size="16">Boundary drift risk</text>
    <text x="728" y="492" font-size="22" font-weight="700">Metrics</text>
    <text x="728" y="522" font-size="16">LOC ↑  CBO ↑  NOC =</text>
  </g>
  <rect x="700" y="574" width="302" height="56" rx="14" fill="#BFDBFE" stroke="#000000" stroke-width="2"/>
  <text x="724" y="608" fill="#1E3A8A" font-family="IBM Plex Sans, Arial, sans-serif" font-size="19" font-weight="700">System impact becomes obvious early</text>

  <path d="M600 162L600 622" stroke="#94A3B8" stroke-width="2" stroke-dasharray="10 10"/>
  <text x="568" y="94" fill="#0F172A" font-family="IBM Plex Sans, Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle">From file noise</text>
  <text x="634" y="94" fill="#0F172A" font-family="IBM Plex Sans, Arial, sans-serif" font-size="30" font-weight="700">to architecture clarity</text>
</svg>
