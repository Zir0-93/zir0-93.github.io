<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" font-family="'JetBrains Mono', monospace">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow-dep" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-inh" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-assoc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="720" fill="#020617"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="600">BFS Neighbourhood Expansion</text>

  <!-- Center point for circles -->
  <g transform="translate(400, 360)">

    <!-- Concentric hop rings -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#1e293b" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#1e293b" stroke-width="1"/>
    <circle cx="0" cy="0" r="210" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="6 4"/>
    <circle cx="0" cy="0" r="280" fill="none" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3 3"/>

    <!-- Hop labels on left side -->
    <text x="-75" y="5" text-anchor="end" fill="#475569" font-size="9">hop-0 (seeds)</text>
    <text x="-145" y="5" text-anchor="end" fill="#475569" font-size="9">hop-1</text>
    <text x="-215" y="5" text-anchor="end" fill="#475569" font-size="9">hop-2</text>
    <text x="-285" y="5" text-anchor="end" fill="#7f1d1d" font-size="9">hop-3 (cap at 500)</text>

    <!-- EDGES LAYER - calculated to stop/start at node edges -->
    <!-- DEPENDENCY edges (solid green) -->
    <!-- FileA(-15,-15,r18) to Svc(-50,-50,r14): direction angle 225deg, offset ~18 from source, ~14 to target -->
    <line x1="-27" y1="-27" x2="-40" y2="-40" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-dep)"/>

    <!-- FileB(15,15,r18) to DAO(50,50,r14): direction angle 45deg -->
    <line x1="27" y1="27" x2="42" y2="42" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-dep)"/>

    <!-- FileB(15,15,r18) to Util(-30,60,r14): direction ~152deg -->
    <line x1="5" y1="29" x2="-24" y2="51" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-dep)"/>

    <!-- FileA(-15,-15,r18) to Repo(70,-20,r14): direction ~15deg -->
    <line x1="2" y1="-10" x2="59" y2="-18" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-dep)"/>

    <!-- INHERITANCE edges (dashed purple) -->
    <!-- Svc(-50,-50,r14) to Config(-100,-80,r12) -->
    <line x1="-60" y1="-58" x2="-91" y2="-75" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-inh)"/>

    <!-- DAO(50,50,r14) to Model(100,80,r12) -->
    <line x1="60" y1="58" x2="91" y2="75" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-inh)"/>

    <!-- Repo(70,-20,r14) to Cache(120,-30,r12) -->
    <line x1="82" y1="-22" x2="111" y2="-28" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-inh)"/>

    <!-- ASSOCIATION edges (dotted amber) -->
    <!-- Util(-30,60,r14) to Logger(-60,110,r12) -->
    <line x1="-38" y1="71" x2="-53" y2="101" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="2 2" marker-end="url(#arrow-assoc)"/>

    <!-- Repo(70,-20,r14) to Cache(120,-30,r12) - different path -->
    <line x1="76" y1="-32" x2="100" y2="-60" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="2 2" marker-end="url(#arrow-assoc)"/>

    <!-- Seed nodes (hop-0) - changed files -->
    <circle cx="-15" cy="-15" r="18" fill="rgba(34, 197, 94, 0.2)" stroke="#22c55e" stroke-width="2"/>
    <text x="-15" y="-11" text-anchor="middle" fill="#86efac" font-size="8" font-weight="600">FileA</text>

    <circle cx="15" cy="15" r="18" fill="rgba(34, 197, 94, 0.2)" stroke="#22c55e" stroke-width="2"/>
    <text x="15" y="19" text-anchor="middle" fill="#86efac" font-size="8" font-weight="600">FileB</text>

    <!-- Hop-1 nodes -->
    <circle cx="-50" cy="-50" r="14" fill="rgba(59, 130, 246, 0.2)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="-50" y="-46" text-anchor="middle" fill="#93c5fd" font-size="8">Svc</text>

    <circle cx="50" cy="50" r="14" fill="rgba(59, 130, 246, 0.2)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="50" y="54" text-anchor="middle" fill="#93c5fd" font-size="8">DAO</text>

    <circle cx="-30" cy="60" r="14" fill="rgba(59, 130, 246, 0.2)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="-30" y="64" text-anchor="middle" fill="#93c5fd" font-size="8">Util</text>

    <circle cx="70" cy="-20" r="14" fill="rgba(59, 130, 246, 0.2)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="70" y="-16" text-anchor="middle" fill="#93c5fd" font-size="8">Repo</text>

    <!-- Hop-2 nodes -->
    <circle cx="-100" cy="-80" r="12" fill="rgba(251, 191, 36, 0.2)" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="-100" y="-76" text-anchor="middle" fill="#fcd34d" font-size="7">Config</text>

    <circle cx="100" cy="80" r="12" fill="rgba(251, 191, 36, 0.2)" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="100" y="84" text-anchor="middle" fill="#fcd34d" font-size="7">Model</text>

    <circle cx="-60" cy="110" r="12" fill="rgba(251, 191, 36, 0.2)" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="-60" y="114" text-anchor="middle" fill="#fcd34d" font-size="7">Logger</text>

    <circle cx="120" cy="-30" r="12" fill="rgba(251, 191, 36, 0.2)" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="120" y="-26" text-anchor="middle" fill="#fcd34d" font-size="7">Cache</text>

    <circle cx="-90" cy="20" r="12" fill="rgba(251, 191, 36, 0.2)" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="-90" y="24" text-anchor="middle" fill="#fcd34d" font-size="7">DTO</text>

    <!-- Hop-3 nodes (dropped due to cap) -->
    <circle cx="-150" cy="-120" r="10" fill="rgba(239, 68, 68, 0.1)" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="-150" y="-116" text-anchor="middle" fill="#fca5a5" font-size="6">Pool</text>

    <circle cx="150" cy="120" r="10" fill="rgba(239, 68, 68, 0.1)" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="150" y="124" text-anchor="middle" fill="#fca5a5" font-size="6">Timer</text>

    <circle cx="-120" cy="150" r="10" fill="rgba(239, 68, 68, 0.1)" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="-120" y="154" text-anchor="middle" fill="#fca5a5" font-size="6">Filter</text>

    <circle cx="170" cy="-70" r="10" fill="rgba(239, 68, 68, 0.1)" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="170" y="-66" text-anchor="middle" fill="#fca5a5" font-size="6">Async</text>
  </g>

  <!-- Legend section -->
  <g transform="translate(50, 660)">
    <!-- Edge types -->
    <line x1="0" y1="8" x2="30" y2="8" stroke="#22c55e" stroke-width="1.5"/>
    <text x="36" y="11" fill="#94a3b8" font-size="9">DEPENDENCY</text>

    <line x1="140" y1="8" x2="170" y2="8" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="176" y="11" fill="#94a3b8" font-size="9">INHERITANCE</text>

    <line x1="280" y1="8" x2="310" y2="8" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="2 2"/>
    <text x="316" y="11" fill="#94a3b8" font-size="9">ASSOCIATION</text>
  </g>

  <g transform="translate(50, 685)">
    <!-- Node types -->
    <circle cx="8" cy="8" r="8" fill="rgba(34, 197, 94, 0.2)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="22" y="11" fill="#94a3b8" font-size="9">Seed (hop-0)</text>

    <circle cx="115" cy="8" r="8" fill="rgba(59, 130, 246, 0.2)" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="128" y="11" fill="#94a3b8" font-size="9">hop-1</text>

    <circle cx="185" cy="8" r="8" fill="rgba(251, 191, 36, 0.2)" stroke="#fbbf24" stroke-width="1"/>
    <text x="198" y="11" fill="#94a3b8" font-size="9">hop-2</text>

    <circle cx="250" cy="8" r="8" fill="rgba(239, 68, 68, 0.1)" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="263" y="11" fill="#94a3b8" font-size="9">dropped (hop-3+)</text>
  </g>

  <!-- Algorithm notes -->
  <g transform="translate(500, 660)">
    <text x="0" y="11" fill="#475569" font-size="8">• Bidirectional BFS: follows edges in both directions</text>
    <text x="0" y="26" fill="#475569" font-size="8">• Node cap: 500 — non-seed nodes dropped in hop-distance order</text>
    <text x="0" y="41" fill="#475569" font-size="8">• Changed files (seeds) are always included</text>
  </g>
</svg>
