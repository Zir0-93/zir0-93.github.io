<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 680" font-family="'Inter',system-ui,sans-serif">
  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="700" height="680" fill="#0f172a" rx="12"/>
  <text x="350" y="36" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="700">BFS Neighbourhood Expansion</text>

  <!-- Concentric rings -->
  <circle cx="350" cy="370" r="80" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  <circle cx="350" cy="370" r="160" fill="none" stroke="#1e293b" stroke-width="1"/>
  <circle cx="350" cy="370" r="240" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- Hop labels -->
  <text x="350" y="296" text-anchor="middle" fill="#475569" font-size="10">hop-0 (seeds)</text>
  <text x="350" y="216" text-anchor="middle" fill="#475569" font-size="10">hop-1</text>
  <text x="350" y="136" text-anchor="middle" fill="#475569" font-size="10">hop-2</text>
  <text x="350" y="56" text-anchor="middle" fill="#475569" font-size="10">hop-3 (cap at 500 nodes)</text>

  <!-- Seed nodes (hop-0) - changed files -->
  <circle cx="340" cy="360" r="16" fill="#22c55e" fill-opacity=".2" stroke="#22c55e" stroke-width="1.5"/>
  <text x="340" y="364" text-anchor="middle" fill="#86efac" font-size="8" font-weight="600">FileA</text>
  <circle cx="370" cy="380" r="16" fill="#22c55e" fill-opacity=".2" stroke="#22c55e" stroke-width="1.5"/>
  <text x="370" y="384" text-anchor="middle" fill="#86efac" font-size="8" font-weight="600">FileB</text>

  <!-- Hop-1 nodes -->
  <circle cx="290" cy="320" r="13" fill="#3b82f6" fill-opacity=".2" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="290" y="324" text-anchor="middle" fill="#93c5fd" font-size="7">Svc</text>
  <circle cx="420" cy="330" r="13" fill="#3b82f6" fill-opacity=".2" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="420" y="334" text-anchor="middle" fill="#93c5fd" font-size="7">DAO</text>
  <circle cx="310" cy="420" r="13" fill="#3b82f6" fill-opacity=".2" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="310" y="424" text-anchor="middle" fill="#93c5fd" font-size="7">Util</text>
  <circle cx="400" cy="415" r="13" fill="#3b82f6" fill-opacity=".2" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="400" y="419" text-anchor="middle" fill="#93c5fd" font-size="7">Repo</text>

  <!-- Hop-2 nodes -->
  <circle cx="230" cy="280" r="11" fill="#f59e0b" fill-opacity=".2" stroke="#f59e0b" stroke-width="1"/>
  <text x="230" y="284" text-anchor="middle" fill="#fbbf24" font-size="7">Config</text>
  <circle cx="480" cy="290" r="11" fill="#f59e0b" fill-opacity=".2" stroke="#f59e0b" stroke-width="1"/>
  <text x="480" y="294" text-anchor="middle" fill="#fbbf24" font-size="7">Model</text>
  <circle cx="250" cy="460" r="11" fill="#f59e0b" fill-opacity=".2" stroke="#f59e0b" stroke-width="1"/>
  <text x="250" y="464" text-anchor="middle" fill="#fbbf24" font-size="7">Logger</text>
  <circle cx="470" cy="450" r="11" fill="#f59e0b" fill-opacity=".2" stroke="#f59e0b" stroke-width="1"/>
  <text x="470" y="454" text-anchor="middle" fill="#fbbf24" font-size="7">Cache</text>
  <circle cx="220" cy="370" r="11" fill="#f59e0b" fill-opacity=".2" stroke="#f59e0b" stroke-width="1"/>
  <text x="220" y="374" text-anchor="middle" fill="#fbbf24" font-size="7">DTO</text>

  <!-- Hop-3 nodes (some greyed out / dropped) -->
  <circle cx="160" cy="240" r="10" fill="#ef4444" fill-opacity=".1" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="160" y="244" text-anchor="middle" fill="#7f1d1d" font-size="7">Pool</text>
  <circle cx="540" cy="260" r="10" fill="#ef4444" fill-opacity=".1" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="540" y="264" text-anchor="middle" fill="#7f1d1d" font-size="7">Timer</text>
  <circle cx="160" cy="470" r="10" fill="#ef4444" fill-opacity=".1" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="160" y="474" text-anchor="middle" fill="#7f1d1d" font-size="7">Filter</text>
  <text x="350" y="620" text-anchor="middle" fill="#7f1d1d" font-size="9" font-style="italic">dropped (beyond cap)</text>

  <!-- Typed edges -->
  <!-- DEPENDENCY (solid) from seeds to hop-1 -->
  <line x1="328" y1="350" x2="300" y2="330" stroke="#22c55e" stroke-width="1" marker-end="url(#a1)"/>
  <line x1="382" y1="374" x2="412" y2="340" stroke="#22c55e" stroke-width="1" marker-end="url(#a1)"/>
  <line x1="330" y1="390" x2="318" y2="412" stroke="#22c55e" stroke-width="1" marker-end="url(#a1)"/>

  <!-- INHERITANCE (dashed) -->
  <line x1="290" y1="310" x2="238" y2="288" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#a1)"/>
  <line x1="420" y1="318" x2="472" y2="298" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#a1)"/>

  <!-- ASSOCIATION (dotted) -->
  <line x1="310" y1="430" x2="258" y2="452" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2 2" marker-end="url(#a1)"/>
  <line x1="400" y1="425" x2="460" y2="442" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2 2" marker-end="url(#a1)"/>

  <!-- Edge type legend -->
  <line x1="30" y1="560" x2="60" y2="560" stroke="#22c55e" stroke-width="1.5"/>
  <text x="66" y="564" fill="#94a3b8" font-size="10">DEPENDENCY</text>
  <line x1="170" y1="560" x2="200" y2="560" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="206" y="564" fill="#94a3b8" font-size="10">INHERITANCE</text>
  <line x1="330" y1="560" x2="360" y2="560" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="2 2"/>
  <text x="366" y="564" fill="#94a3b8" font-size="10">ASSOCIATION</text>

  <!-- Hop legend -->
  <circle cx="46" cy="590" r="7" fill="#22c55e" fill-opacity=".2" stroke="#22c55e" stroke-width="1"/>
  <text x="60" y="594" fill="#94a3b8" font-size="10">Seed (hop-0)</text>
  <circle cx="166" cy="590" r="7" fill="#3b82f6" fill-opacity=".2" stroke="#3b82f6" stroke-width="1"/>
  <text x="180" y="594" fill="#94a3b8" font-size="10">hop-1</text>
  <circle cx="256" cy="590" r="7" fill="#f59e0b" fill-opacity=".2" stroke="#f59e0b" stroke-width="1"/>
  <text x="270" y="594" fill="#94a3b8" font-size="10">hop-2</text>
  <circle cx="346" cy="590" r="7" fill="#ef4444" fill-opacity=".1" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="360" y="594" fill="#94a3b8" font-size="10">dropped</text>

  <!-- Bidirectional annotation -->
  <text x="350" y="650" text-anchor="middle" fill="#475569" font-size="10">Bidirectional BFS: follows edges in both directions from seeds</text>
  <text x="350" y="666" text-anchor="middle" fill="#475569" font-size="10">Node cap: 500 — non-seed nodes dropped in hop-distance order</text>
</svg>
