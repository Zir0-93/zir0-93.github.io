<!DOCTYPE html>
<html>
  {% include head.html %}
  <body class="site-shell">
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div class="site-frame">
      {% include header.html %}
      <main class="content-wrapper" role="main" id="main-content">
        <div class="content-wrapper__inner">
          {{ content }}
        </div>
        {% include footer.html %}
      </main>
    </div>
    <script>
      if (window.anchors) {
        anchors.add();
      }

      const tocRoot = document.querySelector("[data-post-toc]");
      const postRoot = document.querySelector(".post--single");

      if (tocRoot && postRoot) {
        const tocList = tocRoot.querySelector(".post-toc__list");
        const headings = Array.from(postRoot.querySelectorAll("h2"));

        headings.forEach((heading) => {
          if (!heading.id) {
            return;
          }

          const item = document.createElement("li");
          const link = document.createElement("a");
          link.href = "#" + heading.id;
          link.textContent = heading.textContent.trim();
          item.appendChild(link);
          tocList.appendChild(item);
        });

        if (headings.length < 2) {
          tocRoot.hidden = true;
        } else {
          let insertionPoint = headings[0];
          const previousElement = insertionPoint.previousElementSibling;

          if (previousElement && previousElement.tagName === "HR") {
            insertionPoint = previousElement;
          }

          postRoot.insertBefore(tocRoot, insertionPoint);
        }
      }

      // Code copy buttons
      document.querySelectorAll("pre.highlight, .highlight pre").forEach(function(pre) {
        var wrapper = document.createElement("div");
        wrapper.className = "code-block-wrapper";
        var btn = document.createElement("button");
        btn.className = "code-copy-btn";
        btn.textContent = "Copy";
        btn.setAttribute("aria-label", "Copy code to clipboard");
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(pre);
        wrapper.appendChild(btn);
        btn.addEventListener("click", function() {
          var code = pre.querySelector("code");
          navigator.clipboard.writeText(code ? code.textContent : pre.textContent).then(function() {
            btn.textContent = "Copied";
            btn.setAttribute("data-copied", "");
            setTimeout(function() {
              btn.textContent = "Copy";
              btn.removeAttribute("data-copied");
            }, 2000);
          });
        });
      });

      // Lazy load post images and add expand buttons
      document.querySelectorAll(".post img").forEach(function(img, i) {
        if (i > 0) {
          img.setAttribute("loading", "lazy");
        }
        // Make parent position relative for the button
        var parent = img.parentNode;
        if (getComputedStyle(parent).position === "static") {
          parent.style.position = "relative";
        }
        parent.style.display = parent.style.display || "block";
        var btn = document.createElement("button");
        btn.className = "img-expand-btn";
        btn.innerHTML = "&#x26F6;";
        btn.setAttribute("aria-label", "View image fullscreen");
        btn.addEventListener("click", function(e) {
          e.stopPropagation();
          openLightbox(img.src);
        });
        parent.appendChild(btn);
      });

      // Lightbox
      var lightbox = null;
      function openLightbox(src) {
        if (!lightbox) {
          lightbox = document.createElement("div");
          lightbox.className = "img-lightbox";
          var closeBtn = document.createElement("button");
          closeBtn.className = "img-lightbox__close";
          closeBtn.innerHTML = "&times;";
          closeBtn.addEventListener("click", function(e) { e.stopPropagation(); closeLightbox(); });
          lightbox.appendChild(closeBtn);
          var lbImg = document.createElement("img");
          lbImg.src = src;
          lightbox.appendChild(lbImg);
          lightbox.addEventListener("click", closeLightbox);
          document.body.appendChild(lightbox);
        } else {
          lightbox.querySelector("img").src = src;
        }
        lightbox.classList.add("is-open");
        document.body.style.overflow = "hidden";
      }
      function closeLightbox() {
        if (lightbox) {
          lightbox.classList.remove("is-open");
          document.body.style.overflow = "";
        }
      }
      document.addEventListener("keydown", function(e) {
        if (e.key === "Escape") closeLightbox();
      });
    </script>
  </body>
</html>
