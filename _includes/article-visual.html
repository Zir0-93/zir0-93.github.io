<figure class="article-visual-embed" aria-label="Comparison of traditional ML infrastructure and LLM systems">
  <div class="article-visual-embed__card">
    <div class="article-visual-embed__header">
      <div class="article-visual-embed__header-cell"></div>
      <div class="article-visual-embed__header-cell article-visual-embed__header-cell--classic">Traditional ML</div>
      <div class="article-visual-embed__header-cell article-visual-embed__header-cell--llm">With LLMs</div>
    </div>

    <div class="article-visual-embed__row">
      <div class="article-visual-embed__topic">Serving Latency</div>
      <div class="article-visual-embed__cell article-visual-embed__cell--classic">Predictable for a given input profile, with throughput and queueing behavior that can usually be modeled up front.</div>
      <div class="article-visual-embed__cell article-visual-embed__cell--llm">Completion length becomes a runtime variable, so requests that look identical can finish on very different timelines.</div>
    </div>

    <div class="article-visual-embed__row">
      <div class="article-visual-embed__topic">Reproducibility</div>
      <div class="article-visual-embed__cell article-visual-embed__cell--classic">Code, data, and environment drift are the main causes of silent failures across retraining pipelines.</div>
      <div class="article-visual-embed__cell article-visual-embed__cell--llm">Prompts, model versions, tool contracts, and context handling drift too, often without throwing an exception.</div>
    </div>

    <div class="article-visual-embed__row">
      <div class="article-visual-embed__topic">Observability</div>
      <div class="article-visual-embed__cell article-visual-embed__cell--classic">Latency, errors, and output distribution usually tell you whether the system is healthy.</div>
      <div class="article-visual-embed__cell article-visual-embed__cell--llm">Infrastructure metrics stay necessary, but output quality and tool correctness need their own instrumentation layer.</div>
    </div>

    <div class="article-visual-embed__row">
      <div class="article-visual-embed__topic">Cost</div>
      <div class="article-visual-embed__cell article-visual-embed__cell--classic">Mostly a provisioning and utilization problem, with spend driven by cluster sizing decisions.</div>
      <div class="article-visual-embed__cell article-visual-embed__cell--llm">Token volume, retry loops, and model choice pull cost governance up into the application layer.</div>
    </div>

    <div class="article-visual-embed__row">
      <div class="article-visual-embed__topic">Failure Modes</div>
      <div class="article-visual-embed__cell article-visual-embed__cell--classic">Failures tend to be loud: crashed jobs, bad responses, broken pipelines, and obvious traces.</div>
      <div class="article-visual-embed__cell article-visual-embed__cell--llm">Failures can propagate quietly through reasoning steps, producing plausible outputs on top of bad intermediate state.</div>
    </div>
  </div>
  <figcaption class="article-visual-embed__caption">A compact summary of what carries over from classical ML infrastructure, and what changes once reasoning-heavy LLM systems enter the picture.</figcaption>
</figure>
